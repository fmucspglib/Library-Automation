<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Library Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>Library Automation</h1>

        <p class="login-text">

            Librarian Login

        </p>


        <!-- Login Form -->

        <form action="/login"
      method="POST">

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit">

        Login

    </button>

</form>


<div class="forgot-box">

    <a href="/forgot_password">

        Forgot Password?

    </a>

    <br><br>

    <a href="/signup">

        Create Account

    </a>

</div>

        <!-- Forgot Password -->

        <div class="forgot-box">

            <a href="/forgot_password">

                Forgot Password?

            </a>

        </div>

    </div>

</div>

</body>
</html>
